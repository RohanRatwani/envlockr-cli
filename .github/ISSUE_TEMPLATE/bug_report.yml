name: 🐛 Bug Report
description: Something isn't working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! ⚠️ **Do not paste real secret values or your vault contents.**
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: Running `envlockr run -- npm run dev` does X, but I expected Y.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. envlockr add FOO --value bar --force
        2. envlockr run -- env | grep FOO
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: EnvLockr version
      description: Output of `envlockr --version`
      placeholder: EnvLockr v2.0.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11"
    validations:
      required: true
  - type: input
    id: keychain
    attributes:
      label: Keychain extra installed?
      description: Did you install `envlockr[keychain]`?
      placeholder: "yes / no"
