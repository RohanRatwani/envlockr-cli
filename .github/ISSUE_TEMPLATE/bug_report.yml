name: Bug Report
description: Report a bug or unexpected behavior in envlockr-cli
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below to help us reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide step-by-step instructions to reproduce the bug.
      placeholder: |
        1. Run `envlockr add MY_KEY`
        2. Run `envlockr get MY_KEY`
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: I expected...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Screenshots or Logs
      description: If applicable, paste any error output, logs, or screenshots here.
      placeholder: Paste logs or describe screenshots...

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Ubuntu / Debian
        - macOS
        - Windows
        - Other Linux
        - Other
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: Run `python --version` and paste the output here.
      placeholder: "e.g. Python 3.11.0"
    validations:
      required: true
